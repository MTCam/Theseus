name: CI Quick

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    name: Ubuntu/GCC
    runs-on: ubuntu-22.04
    env:
      CMAKE_BUILD_TYPE: Debug
      INSTALL_PREFIX: ${{ github.workspace }}/deps
      PYVISTA_OFF_SCREEN: "true"
      QT_QPA_PLATFORM: "offscreen"
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Show submodule SHAs (debug)
        run: git submodule status --recursive
      - name: Install toolchain and deps (MPI, hypre, metis)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-12 g++-12 gfortran-12 libgl1 libegl1 \
            mpich libmpich-dev environment-modules \
            cmake ninja-build pkg-config ccache jq
          echo "CC=mpicc"   >> $GITHUB_ENV
          echo "CXX=mpicxx" >> $GITHUB_ENV
          echo "FC=mpifort" >> $GITHUB_ENV

      - name: Configure SSH for private deps
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.PLATO_DEPLOY_KEY }}" > ~/.ssh/plato_key
          echo "${{ secrets.THERMO_DATABASE_DEPLOY_KEY }}" > ~/.ssh/database_key
          chmod 600 ~/.ssh/plato_key
          chmod 600 ~/.ssh/database_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host github-plato
            HostName github.com
            User git
            IdentityFile ~/.ssh/plato_key
            IdentitiesOnly yes

          Host github-database
            HostName github.com
            User git
            IdentityFile ~/.ssh/database_key
            IdentitiesOnly yes
          EOF

          chmod 600 ~/.ssh/config

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ci-resources/requirements-ci.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ci-resources/requirements-ci.txt

      - name: Install TPL Packages (HYPRE, METIS, MFEM, PLATO)
        env:
          PLATO_REPO: git@github-plato:chess-uiuc/plato.git
          THERMO_DATABASE_REPO: git@github-database:chess-uiuc/database.git
        run: |
          bash ./scripts/install-deps.sh

      - name: Export TPL runtime library path
        run: |
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/tpl/install/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV

      - name: Show built dependency libs (debug)
        if: always()
        run: |
          cat tpl/logs/deps-build*.txt
          find tpl/install -name 'libGKlib*' -o -name 'libmetis*' -o -name 'libmfem*'

      - name: Configure Theseus
        env:
          # CONFIG_FILE: compile_config.json
          CC: ${{ env.CC }}
          CXX: ${{ env.CXX }}
          FC: ${{ env.FC }}
          # These paths match your script’s build outputs
          MFEM_DIR: ${{ github.workspace }}/tpl/install
        run: |
          mkdir -p build
          #  -DCONFIG_FILE=${CONFIG_FILE}
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DBUILD_TESTING=ON \
            -DCMAKE_PREFIX_PATH=${MFEM_DIR} \
            -DCMAKE_BUILD_RPATH=${MFEM_DIR}/lib \
            -DCMAKE_INSTALL_RPATH=${MFEM_DIR}/lib \
            -DSUBCELL_FV_BLENDING=ON -DNO_OPT=ON \
            -DTHESEUS_WITH_PLATO=YES

      - name: Build Theseus
        run: |
          cmake --build build -- -k 0
          ldd build/theseus || true

      - name: Example smoke test (Euler, IsentropicVortex)
        run: |
          scripts/run_theseus.sh \
            -b "$(pwd)/build" \
            -c TestCases/Euler/2D/IsentropicVortex/config.json \
            -t "0.002" -n 100


      - name: Example smoke test (CNS, LidDrivenCavity)
        run: |
          scripts/run_theseus.sh \
            -b "$(pwd)/build" \
            -c TestCases/NavierStokes/2D/LidDrivenCavity/config.json \
            -t "0.0001" -n 100

      - name: Example smoke test (Euler, LTEVortex)
        run: |
          scripts/run_theseus.sh \
            -b "$(pwd)/build" \
            -c TestCases/LTE/Euler/LTEVortex/config.json \
            -t "1e-5" -n 100

      - name: Example regression test (Cyclic - IsentropicVortex)
        run: |
          rm -rf RegressionTests/IsentropicVortex
          scripts/run_theseus.sh \
            -b "$(pwd)/build" \
            -c TestCases/Euler/2D/IsentropicVortex/config.json \
            -o ./RegressionTests
          cd RegressionTests/IsentropicVortex
          python ../../scripts/compare_viz.py ParaView/ParaView.pvd --fields Density --atol 5e-5 --rtol 2e-6
          cd -

      - name: Example regression test (Gold standard - IsentropicVortex)
        run: |
          rm -rf RegressionTests/IsentropicVortex
          scripts/run_theseus.sh \
            -t "0.001" \
            -n "500" \
            -b "$(pwd)/build" \
            -c TestCases/Euler/2D/IsentropicVortex/config.json \
            -o ./RegressionTests
          python scripts/compare_viz.py RegressionTests/IsentropicVortex/ParaView/Cycle000500/data.pvtu TestCases/GoldenData/IsentropicVortex/Cycle000500/data.pvtu --atol 1e-13 --rtol 1e-13

      - name: Example regression test (Gold standard - LTEVortex)
        run: |
          rm -rf RegressionTests/LTEVortex
          scripts/run_theseus.sh \
            -t "1e-5" \
            -n "200" \
            -b "$(pwd)/build" \
            -c TestCases/LTE/Euler/LTEVortex/config.json \
            -o ./RegressionTests
          python scripts/compare_viz.py RegressionTests/LTEVortex/ParaView/Cycle000200/data.pvtu TestCases/GoldenData/LTEVortex/Cycle000200/data.pvtu --atol 1e-13 --rtol 1e-13

      - name: Example regression test (Gold standard - LidDrivenCavity)
        run: |
          rm -rf RegressionTests/LidDrivenCavity
          scripts/run_theseus.sh \
            -t "0.0001" \
            -n "4000" \
            -b "$(pwd)/build" \
            -c TestCases/NavierStokes/2D/LidDrivenCavity/config.json \
            -o ./RegressionTests
          python scripts/compare_viz.py RegressionTests/LidDrivenCavity/ParaView/Cycle004000/data.pvtu TestCases/GoldenData/LidDrivenCavity/Cycle004000/data.pvtu --atol 1e-12 --rtol 1e-12

      - name: Example regression test (Gold standard - TaylorGreenVortex2D)
        run: |
          rm -rf RegressionTests/TaylorGreenVortex
          scripts/run_theseus.sh \
            -t "0.0001" \
            -n "100" \
            -b "$(pwd)/build" \
            -c TestCases/NavierStokes/2D/TaylorGreenVortex/config.json \
            -o ./RegressionTests
          python scripts/compare_viz.py RegressionTests/TaylorGreenVortex/ParaView/Cycle000100/data.pvtu TestCases/GoldenData/TaylorGreenVortex2D/Cycle000100/data.pvtu --atol 1e-13 --rtol 1e-13

      - name: Example regression test (Gold standard - ForwardFacingStep)
        run: |
          cd TestCases/GoldenData
          tar zxvf ForwardFacingStep.tgz
          cd ../..
          rm -rf RegressionTests/ForwardFacingStep
          scripts/run_theseus.sh \
            -t "0.0001" \
            -n "100" \
            -b "$(pwd)/build" \
            -c TestCases/Euler/2D/ForwardFacingStep/config.json \
            -o ./RegressionTests
          python scripts/compare_viz.py RegressionTests/ForwardFacingStep/ParaView/Cycle000100/data.pvtu TestCases/GoldenData/ForwardFacingStep/Cycle000100/data.pvtu --atol 1e-13 --rtol 1e-13

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload quick artifacts (logs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: theseus-quick-logs
          path: |
            build/Testing/**/Test.xml
            build/CMakeCache.txt
            build/**/*.log
            RegressionTests
            RunTheseus
            RunTests
